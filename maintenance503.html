<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>503 Service Unavailable</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #8f9aa3; /* same background */
    }

    /* Wrapper gives spacing around card */
    .wrapper {
      padding: 20px;
    }

    /* Card */
    .card {
      background: #e9e9e9; /* light grey like screenshot */
      padding: 30px 40px;
      border-radius: 6px;
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
    }

    h1 {
      margin: 0 0 20px;
      font-size: 28px;
      font-weight: 600;
      color: #1f2d3d;
    }

    .message {
      font-size: 16px;
      color: #2f3e4e;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .home-link {
      font-size: 16px;
      color: #0a7ea4;
      text-decoration: none;
      font-weight: 500;
    }

    .home-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="wrapper">
    <div class="card">

      <h1>Service Unavailable</h1>

      <div class="message">
        We're temporarily unable to process your request.<br>
        This may be due to maintenance or high traffic.
      </div>

      <h3 class="home-link">Please come back in a few minutes</h3>

    </div>
  </div>

</body>
</html>
