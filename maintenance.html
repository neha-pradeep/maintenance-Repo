<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maintenance</title>

  
<style>
    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #8f9aa3; /* same background */
    }

    /* Wrapper gives spacing around card */
    .wrapper {
      padding: 20px;
    }

    /* Card */
    .card {
      background: #e9e9e9; /* light grey like screenshot */
      padding: 30px 40px;
      border-radius: 6px;
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
    }

    h1 {
      margin: 0 0 20px;
      font-size: 28px;
      font-weight: 600;
      color: #1f2d3d;
    }

    .message {
      font-size: 16px;
      color: #2f3e4e;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .home-link {
      font-size: 16px;
      color: #0a7ea4;
      text-decoration: none;
      font-weight: 500;
    }

    .home-link:hover {
      text-decoration: underline;
    }
  </style>

</head>

<body>

    <div class="card">
  <div class="wrapper">

      <h1>Site Under Maintenance</h1>

      <div class="message">
        Our website is currently under maintenance.<br>
        We're working hard to improve your experience.<br><br>
        <h3 style="color:#0a7ea4">Please check back later.</h3>
      </div>



    </div>
  </div>

</body>
</html>
``
