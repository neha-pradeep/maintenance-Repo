<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maintenance</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(#8f9aa3, #9eabb6);
    }

    .wrapper {
      padding: 20px;
    }

    /* Card */
    .card {
      background: #e3e3e3;
      padding: 30px 32px;
      border-radius: 6px;
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.15);
    }

    /* Heading */
    h1 {
      font-size: 28px;
      font-weight: 600;
      margin: 0 0 22px;
      color: #1f2d3d; /* dark blue-grey like screenshot */
    }

    /* Message text */
    .message {
      font-size: 16px;
      color: #2f3e4e; /* slightly muted dark text */
      line-height: 1.6;
      margin-bottom: 26px;
    }

    /* Link */
    .home-link {
      font-size: 16px;
      font-weight: 500;
      color: #0a7ea4; /* teal-blue link */
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .home-link:hover {
      text-decoration: underline;
    }

    /* Arrow styling */
    .arrow {
      font-size: 18px;
    }
  </style>
</head>

<body>

  <div class="wrapper">
    <div class="card">

      <h1>Site Under Maintenance</h1>

      <div class="message">
        Our website is currently under maintenance.<br>
        We're working hard to improve your experience.<br><br>
        <h3 style="color:#0a7ea4">Please check back later.</h3>
      </div>



    </div>
  </div>

</body>
</html>
``
