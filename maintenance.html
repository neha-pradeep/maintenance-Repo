<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maintenance</title>

  <!-- ✅ Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;

      /* ✅ same gradient style as your image */
      background: linear-gradient(135deg, #4b6cb7, #1e2a4a);
    }

    .card {
      background: #f7f7f7;
      padding: 50px 60px;
      border-radius: 18px;
      text-align: center;
      width: 420px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.2);
    }

    /* ✅ SMALL & SUBTLE ICON */
    .icon {
      width: 70px;        /* reduced from very large */
      margin-bottom: 20px;
      opacity: 0.9;
    }

    h1 {
      font-size: 30px;
      color: #222;
      margin-bottom: 15px;
      font-weight: 600;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #ddd;
      margin: 20px 0;
    }

    p {
      font-size: 16px;
      color: #5f6f81;
      line-height: 1.6;
    }

    .spacer {
      margin-top: 20px;
    }

  </style>
</head>

<body>

  <div class="card">

    <!-- ✅ smaller warning icon -->
    <img class="icon" 
      src="https://cdn-icons-png.flaticon.com/512/463/463612.png" 
      alt="maintenance icon">

    <h1>We'll Be Back Soon</h1>

    <div class="divider"></div>

    <p>
      Our website is currently under maintenance.<br>
      We're working hard to improve your experience.
    </p>

    <p class="spacer">
      Please check back later.
    </p>

  </div>

</body>
</html>
